name: Skills Drift Check

on:
  workflow_dispatch:
    inputs:
      hoop_ref:
        description: "Git ref of hoophq/hoop to check against"
        required: false
        default: "main"
  repository_dispatch:
    types: [server-go-changed]

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: hoophq/hoop
          ref: ${{ github.event.inputs.hoop_ref || github.event.client_payload.ref || 'main' }}
          path: hoop
          sparse-checkout: gateway/api/server.go
          sparse-checkout-cone-mode: false

      - name: Run drift check
        id: drift
        run: |
          bash scripts/drift-check.sh "$GITHUB_WORKSPACE/hoop/gateway/api/server.go" \
            | tee "$GITHUB_WORKSPACE/drift-report.txt"

      - name: Upload drift report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.txt
          retention-days: 30
